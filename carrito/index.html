<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Carrito de compras de TrendyShop con resumen del pedido."
    />
    <title>TrendyShop | Carrito</title>
    <link rel="icon" href="../assets/images/trendyshop_favicon.ico" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div data-header data-base=".."></div>

    <main class="site-main">
      <section class="cart-page">
        <div class="container">
          <div class="page-heading">
            <span>Carrito de compras</span>
            <h1>Revisa tu pedido</h1>
            <p>
              Tus productos agregados desde el catalogo o la pagina de inicio
              aparecen aqui para continuar al checkout.
            </p>
          </div>

          <div class="cart-layout">
            <section class="cart-items" data-cart-items aria-label="Productos en el carrito">
              <p>Cargando carrito...</p>
            </section>

            <aside class="order-summary" aria-label="Resumen del carrito">
              <h2>Resumen</h2>
              <div class="summary-row">
                <span>Subtotal</span>
                <strong data-cart-subtotal>$0</strong>
              </div>
              <div class="summary-row" data-cart-shipping-row hidden>
                <span>Envio estimado</span>
                <strong data-cart-shipping>$0</strong>
              </div>
              <div class="summary-row summary-row--total">
                <span>Total</span>
                <strong data-cart-total>$0</strong>
              </div>
              <a class="button-primary" href="../checkout/">Continuar al checkout</a>
              <a class="button-secondary" href="../catalogo/">Seguir comprando</a>
            </aside>
          </div>
        </div>
      </section>
    </main>

    <div data-footer data-base=".."></div>

    <script type="module" src="../js/app.js"></script>
  </body>
</html>
