<!doctype html>
<html lang="es" data-bs-theme="light">
  <head>
    <title>TrendyShop | Catalogo</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="../assets/images/trendyshop_favicon.ico" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="./../css/catalogo.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>

  <body>
    <div data-header data-base=".."></div>

    <main class="site-main catalog-page">
      <nav class="menu-clothing">
        <ul class="list-menu">
          <li id="btn-get-men"><a href="#">Hombre</a></li>
          <li id="btn-get-women"><a href="#">Mujer</a></li>
          <li id="btn-get-all"><a href="#">Todo</a></li>
        </ul>
      </nav>

      <section class="container catalog-favorites" id="favoritos">
        <div class="page-heading">
          <span>Favoritos</span>
          <h1>Articulos que te gustan</h1>
          <p>Guarda productos para revisarlos despues o agregarlos al carrito.</p>
        </div>
        <div class="catalog-favorites__grid" data-favorites-list></div>
      </section>

      <section class="container">
        <div class="row" id="product-list"></div>
      </section>
    </main>

    <div data-footer data-base=".."></div>

    <script type="module" src="../js/app.js"></script>
    <script type="module" src="./../js/productos.js"></script>
  </body>
</html>
